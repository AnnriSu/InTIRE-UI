<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>InTIRE</title>
    <link href="assests/style.css" rel="stylesheet">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body>

    <div class="index-container d-flex justify-content-center align-items-center" style="height: 60vh;">

    </div>
    

    <div class="index-footer">
    
        <script>
            window.addEventListener('DOMContentLoaded', function() {
                document.querySelector('.index-footer').classList.add('slide-in');

        </script>

        <div>
            <h1>Welcome to InTIRE</h1>
            <h6> <br>Your smart solution for fast and accurate tire defect inspection, powered by intelligent image detection.</h6> <br>
        </div>

        <div>
            <button type="button" class="signin-btn" onclick="window.location.href='signIn.html'">Sign In</button>
        </div>

        <div>
            <button type="button" class="register-btn" onclick="window.location.href='register.html'">Register</button>
        </div>
        
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
