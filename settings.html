<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>InTIRE Settings</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container-fluid app-wrapper settings">

        <h1 class="settings-title">Settings</h1>

        <!-- Dark Mode -->
        <button class="setting-card w-100">
            <div class="setting-left">
                <i class="bi bi-moon"></i>
                <span>Dark Mode</span>
            </div>
            <span class="setting-right">Disabled</span>
        </button>

        <!-- Privacy -->
        <button class="setting-card w-100">
            <div class="setting-left">
                <i class="bi bi-lock"></i>
                <span>Privacy</span>
            </div>
            <span class="setting-right">Manage</span>
        </button>

        <!-- App Version -->
        <div class="setting-card">
            <div class="setting-left">
                <i class="bi bi-phone"></i>
                <span>App Version</span>
            </div>
            <span class="setting-right">1.0</span>
        </div>

        <!-- Logout -->
        <button class="setting-card w-100">
            <div class="setting-left">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </div>
            <span class="setting-right">></span>
        </button>

    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="homepage.html">
            <i class="bi bi-house nav-icon"></i>
        </a>
        <a href="profile.html">
            <i class="bi bi-person nav-icon"></i>
        </a>
        <a href="settings.html">
            <i class="bi bi-gear nav-icon active"></i>
        </a>
    </div>

</body>

</html>
